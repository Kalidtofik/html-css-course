<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hovers, Transition and Shadows</title>
  <style>
    .uber-request-button {
      background-color: black;
      color: white;
      border: none;
      height: 36px;
      width: 110px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .uber-request-button:hover {
      opacity: 0.88;
    }

    .uber-request-button:active {
      opacity: 0.75;
    }

    .amazon-cart-button {
      background-color: rgb(255, 216, 20);
      border: none;
      height: 28px;
      width: 105px;
      border-radius: 15px;
      cursor: pointer;
      transition: background-color 0.15s, black 0.15s;
    }

    .amazon-cart-button:hover {
      background-color: rgb(235, 190, 9);
      color: black;
    }

    .amazon-cart-button:active {
      opacity: 0.75;
    }

    .amazon-buy-button {
      background-color: rgb(232, 146, 16);
      border: none;
      height: 28px;
      width: 105px;
      border-radius: 15px;
      cursor: pointer;
      transition: background-color 0.15s, black 0.15s;
    }

    .amazon-buy-button:hover {
      background-color: rgb(205, 101, 4);
      color: black;
    }

    .amazon-buy-button:active {
      opacity: 0.75;
    }

    .linkedIn-apply-button {
      background-color: rgb(10, 102, 194);
      color: white;
      border: none;
      height: 30px;
      width: 194px;
      border-radius: 15px;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    .linkedIn-apply-button:hover {
      background-color: rgb(5, 56, 127);
      color: white;
    }

    .linkedIn-apply-button:active {
      opacity: 0.75;
    }

    .linkedIn-save-button {
      color: rgb(10, 102, 194);
      background-color: white;
      border-color: rgb(10, 102, 194);
      border-width: 1px;
      border-style: solid;
      height: 30px;
      width: 60px;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    .linkedIn-save-button:hover {
      background-color: rgb(208, 222, 235);
      color: rgb(10, 102, 194);
      box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.15);
    }

    .linkedIn-save-button:active {
      opacity: 0.7;
    }

    /* I use div to make easily understood that they are found on the same buttons */

    .linkedIn-apply-save-container {
      background-color: rgb(198, 198, 198);
      padding: 10px;
      display: inline-block;
      margin-left: 10px;
      margin-bottom: 30px;
    }

    .amazon-button-link:visited {
      color: purple;
    }

    .amazon-button-link:hover {
      color: rgb(142, 71, 0);
    }

    .amazon-button-link:active {
      color: rgb(1, 98, 1);
    }
  </style>
</head>
<body>
  <!--Exercises-->
  <button class="uber-request-button">Request Now</button>
  <button class="amazon-cart-button">Add to Cart</button>
  <div class="linkedIn-apply-save-container">
    <button class="linkedIn-apply-button">Apply on Company Website</button>
    <button class="linkedIn-save-button">Save</button>
  </div>

    <!--Challenge Exercise-->
  <div style="background-color: rgb(225, 225, 225);
              display: inline-block;
              padding-left: 10px;
              padding-right: 20px;
              padding-top: 10px;
              padding-bottom: 10px;
              margin-left: 30px;">
  <a class="amazon-button-link" href="https://www.amazon.com" target="_blank" rel="noopener noreferrer">
    Back to Amazon
  </a>

  <p style="font-weight: 700;
            font-size: 20px;">
    Nike Black Running Shoes
  </p>

  <p style="color: rgb(0, 118, 0);
            font-size: 14px;
            font-weight: 700;">
    $39 - in Stock
  </p>

  <p style="font-size: 14px;">
    Free delivery tomorrow
  </p>

  <button class="amazon-cart-button">
    Add to Cart
  </button>

  <button class="amazon-buy-button">
    Buy Now
  </button>
  </div>
</body>
</html>
